{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; padding: 20px;">
    <h2 style="text-align: center; border-bottom: 2px solid #0056b3; padding-bottom: 10px;">系統登入</h2>
    
    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">登入</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; font-size: 14px;">
        還沒有帳號？ <a href="/register/" style="color: #0056b3;">點此註冊</a>
    </p>
</div>
{% endblock %}
