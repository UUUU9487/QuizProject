<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <script>
      MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資料結構測驗實驗室</title>
    <style>
        /* OOOPEN 明亮活潑風格設定 */
        body { 
            font-family: "PingFang TC", "微軟正黑體", sans-serif; 
            background-color: #fdfaf6; /* 溫暖的米白底色 */
            color: #333; 
            margin: 0; 
            padding: 0; 
            line-height: 1.6;
        }
        
        /* 頂部導覽列 (純白、去線條、現代感) */
        .navbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 50px; 
            background-color: #ffffff; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
            font-weight: bold;
        }
        .nav-brand { font-size: 22px; font-weight: 900; letter-spacing: 1px; color: #111; }
        
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: #555; text-decoration: none; font-size: 15px; transition: 0.2s; }
        .nav-links a:hover { color: #000; }
        
        /* 登入按鈕 (膠囊形狀) */
        .nav-right a {
            border: 1px solid #111;
            padding: 8px 20px;
            border-radius: 50px; /* 大圓角膠囊 */
            text-decoration: none;
            color: #111;
            font-size: 14px;
            transition: 0.2s;
        }
        .nav-right a:hover { background-color: #111; color: #fff; }
        .nav-right .user-name { margin-right: 15px; color: #666; font-size: 14px; font-weight: normal; border: none; }

        /* 主要內容區塊 (卡片化) */
        .container { 
            max-width: 800px; 
            margin: 60px auto; 
            background: #ffffff; 
            padding: 50px; 
            border-radius: 24px; /* 超大圓角 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* 柔和陰影 */
            text-align: center;
        }
        
        /* 共用主要按鈕 (全黑膠囊) */
        .btn, button { 
            background-color: #111; 
            color: #fff; 
            padding: 12px 30px; 
            border: none; 
            border-radius: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            text-decoration: none; 
            font-size: 16px; 
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover, button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
        }
        
        select, input[type="text"], input[type="password"] {
            background-color: #f7f7f7;
            color: #333;
            border: 1px solid #eee;
            padding: 12px 20px;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
            margin-top: 10px;
        }

        /* 表格設定 (乾淨留白) */
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { color: #888; font-size: 14px; font-weight: normal; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">資料結構測驗</div>
        
        <div class="nav-links">
            <a href="/">首頁</a>
            <a href="/history/">歷史成績</a>
            <a href="/review/">錯題複習</a>
            <a href="/leaderboard/">排行榜</a>
        </div>
        
        <div class="nav-right">
            {% if user.is_authenticated %}
                <span class="user-name">嗨，{{ user.username }}</span>
                <a href="/logout/">登出</a>
            {% else %}
                <a href="/login/">登入 / 註冊</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
